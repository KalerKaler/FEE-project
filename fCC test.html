<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fCC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body {
          background: #742929;
          display: flex;
          flex-direction: row;
          align-items: center;
          justify-content: center;
          height: 100vh;
          gap: 15rem;
        }

        #lyrics{
          align-items: right;
          display: none ;
          --am-lyrics-highlight-color: pink;
          --highlight-color: gold;
        }

        #player{
          align-items: left;
          display: block;
        }

        .playerBox{
          padding : 3rem;
          align-items: left;
          left: 2vw;
          display: flex;
          flex-direction: column;
          gap: 5rem;
          background-color: rgba(10, 10, 10, 0.2);
          max-height: 80vh;
          border-radius: 6%;
        }

        #coverImg{
          display: none;
          width: 300px;
          height: 300px;
          border-radius: 10%;
          align-items: center;
          align-self: center;
        }

        #anotherSong{
          display: none;
          color: lightgreen;
          background-color: darkorchid;
        }

        #anotherSong:hover, #file:hover{
          cursor: pointer;
        }

        #songName{
          color: hotpink;
          display: none;
          text-align: center;
        }
    </style>
  </head>
  <body>

    <div class="playerBox">
      <img id="coverImg" >
      <input type="file" id = "file">
      <h1 id="songName"></h1>
      <audio id = "audio" controls></audio>
      <button id="anotherSong">Select a different song</button>
    </div>
    

    <am-lyrics
    song-title=""
    song-artist=""
    song-duration=""
    current-time="0"
    duration=""
    highlight-color="#f00"
    font-family="'Inter', Arial, sans-serif"
    autoscroll
    interpolate
    id = "lyrics"
    ></am-lyrics>


    <script type="module">
      import 'https://cdn.jsdelivr.net/npm/@uimaxbai/am-lyrics/dist/src/am-lyrics.min.js';

      const inputFile = document.getElementById("file");
      const player = document.getElementById("audio");
      const lyrics = document.getElementById("lyrics");
      const cover = document.getElementById("coverImg");
      const anotherSong = document.getElementById("anotherSong");
      const songName = document.getElementById("songName");

      function syncLyrics() {
        if (!player.paused) {
          lyrics.currentTime = player.currentTime * 1000;
        }
        requestAnimationFrame(syncLyrics);
      }

      requestAnimationFrame(syncLyrics);

      inputFile.addEventListener("change", function(f) {
        const file = f.target.files[0];
        if (!file) return;

        inputFile.style.display = 'none';
        cover.style.display = 'block';
        lyrics.style.display = 'block';
        anotherSong.style.display = 'block';
        songName.style.display = 'block';

        const songURL = URL.createObjectURL(file);
        player.src = songURL;
        player.play();

        window.jsmediatags.read(file, {
          onSuccess: function(tag) {
            const tags = tag.tags;

            const title = tags.title || file.name.replace(/\.[^/.]+$/, "");
            const artist = tags.artist || "Unknown Artist";
            const album = tags.album || "Unknown Album";
            const image = tags.picture;
            
            document.title = `${title} - ${artist}`;
            songName.innerHTML = `${title} <br> ${artist}`;
            lyrics.setAttribute("song-title", title);
            lyrics.setAttribute("song-artist", artist);
            lyrics.setAttribute("song-album", album);

            if (image){
              const imageData = new Uint8Array(image.data);
              const blob = new Blob([imageData], {type: image.format});
              const url = URL.createObjectURL(blob);
              cover.src = url;
            }else{
              cover.src="defaultFallbackCover.jpg";
            }
            
          }
        })
        
        player.onloadedmetadata = () => {
          lyrics.setAttribute("song-duration", (player.duration * 1000).toString());
        };

        lyrics.addEventListener('line-click', event => {
          player.currentTime = event.detail.timestamp / 1000;
          console.log('Seek to:', event.detail.timestamp); // timestamp in milliseconds
        });

        anotherSong.addEventListener('click', () => {
          inputFile.style.display = 'block';
        cover.style.display = 'none';
        songName.style.display = 'none';
        lyrics.style.display = 'none';
        anotherSong.style.display = 'none';
        player.src = "";
        player.pause();
        })
      });

    </script>
  </body>
</html>
